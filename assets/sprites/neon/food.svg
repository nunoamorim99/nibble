<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64"><defs>
    <filter id="neonGlowSoft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="neonGlowStrong" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="neonBodyFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#161327" />
      <stop offset="1" stop-color="#241a3d" />
    </linearGradient>
    <radialGradient id="neonOrbGrad" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="0.35" stop-color="#5ef0ff" />
      <stop offset="0.75" stop-color="#ff3ad1" />
      <stop offset="1" stop-color="#2a0a3d" />
    </radialGradient>
  </defs>
    <circle cx="32" cy="32" r="24" fill="url(#neonOrbGrad)" filter="url(#neonGlowStrong)" />
    <circle cx="32" cy="32" r="24" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.7" />
    <circle cx="32" cy="32" r="15" fill="none" stroke="#4ff2ff" stroke-width="1.2" opacity="0.6" />
  </svg>