<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nibble</title>
    <meta name="description" content="Nokia-style Snake for the web — installable PWA." />
    <meta name="theme-color" content="#c4cfa1" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        display: grid;
        place-items: center;
        background: #1a1c16;
      }
      canvas {
        image-rendering: pixelated;
        max-width: 100vmin;
        max-height: 100vmin;
      }
    </style>
  </head>
  <body>
    <canvas id="game" width="480" height="480">Nibble needs canvas support to run.</canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
