<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nibble</title>
    <meta name="description" content="Nokia-style Snake for the web — installable PWA." />
    <meta name="theme-color" content="#c4cfa1" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #1a1c16;
      }
      #app {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        width: 100%;
        max-width: 100vmin;
      }
      canvas {
        image-rendering: pixelated;
        touch-action: none;
        display: block;
        width: 100%;
        max-width: 100vmin;
        max-height: 100vmin;
        aspect-ratio: 1 / 1;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="game" width="480" height="480">Nibble needs canvas support to run.</canvas>
      <div id="ui-root"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
