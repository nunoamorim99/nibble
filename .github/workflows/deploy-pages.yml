name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run test

      # The global leaderboard stays disabled unless the repo provides these
      # (Settings -> Secrets and variables -> Actions). The anon key is a
      # publishable client key by design, but a secret keeps it out of logs.
      - run: npm run build
        env:
          VITE_LEADERBOARD_URL: ${{ vars.VITE_LEADERBOARD_URL }}
          VITE_LEADERBOARD_ANON_KEY: ${{ secrets.VITE_LEADERBOARD_ANON_KEY }}
          VITE_LEADERBOARD_TABLE: ${{ vars.VITE_LEADERBOARD_TABLE }}

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
