<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    Nibble app icon — a miniature of the README cover scene: a glossy green
    snake coiled on a glowing perspective grid, neck arching over so its head
    dips toward a red apple.

    MASKABLE-SAFE BY CONSTRUCTION: the background (gradient + grid) bleeds to
    every edge and may be cropped by any OS mask shape; the subject (snake,
    apple, face details) is authored entirely inside the safe-zone CIRCLE of
    radius 40% (r=204.8 around 256,256 — kept under r~190 for margin). The
    same art therefore serves purpose "any" AND purpose "maskable" without
    any rescaling step. Hand-authored vector — no AI image generation.

    Construction note: the head is NOT a separate circle — it is a short
    continuation path stroked wider than the body, starting at the body's end
    point with a matching tangent, so its round start cap fully swallows the
    body's end cap and the swell reads as one seamless creature.
  -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="78%">
      <stop offset="0%" stop-color="#0e2418" />
      <stop offset="55%" stop-color="#081510" />
      <stop offset="100%" stop-color="#040a07" />
    </radialGradient>
    <linearGradient id="body" gradientUnits="userSpaceOnUse" x1="0" y1="150" x2="0" y2="420">
      <stop offset="0%" stop-color="#5fe08d" />
      <stop offset="100%" stop-color="#2b8f4e" />
    </linearGradient>
    <radialGradient id="apple" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#ff6b5e" />
      <stop offset="55%" stop-color="#d63a30" />
      <stop offset="100%" stop-color="#8e1d18" />
    </radialGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)" />

  <!-- Perspective grid floor (background layer — safe to crop). Two passes
       per line: a wide translucent stroke for glow, a narrow crisp one. -->
  <g stroke="#35e089" fill="none">
    <!-- glow pass -->
    <g opacity="0.12" stroke-width="7">
      <path d="M0 300 H512 M0 316 H512 M0 338 H512 M0 368 H512 M0 410 H512 M0 464 H512" />
      <path d="M269.9 300 L312 512 M242.1 300 L200 512 M295.7 300 L416 512 M216.3 300 L96 512 M327.5 300 L544 512 M184.5 300 L-32 512 M367.2 300 L704 512 M144.8 300 L-192 512 M414.9 300 L896 512 M97.1 300 L-384 512" />
    </g>
    <!-- crisp pass, brighter toward the viewer -->
    <path d="M0 300 H512" stroke-width="3" opacity="0.5" />
    <path d="M0 316 H512" stroke-width="2.5" opacity="0.22" />
    <path d="M0 338 H512" stroke-width="2.5" opacity="0.28" />
    <path d="M0 368 H512" stroke-width="3" opacity="0.34" />
    <path d="M0 410 H512" stroke-width="3.5" opacity="0.42" />
    <path d="M0 464 H512" stroke-width="4" opacity="0.5" />
    <g stroke-width="2.5" opacity="0.3">
      <path d="M269.9 300 L312 512" />
      <path d="M242.1 300 L200 512" />
      <path d="M295.7 300 L416 512" />
      <path d="M216.3 300 L96 512" />
      <path d="M327.5 300 L544 512" />
      <path d="M184.5 300 L-32 512" />
      <path d="M367.2 300 L704 512" />
      <path d="M144.8 300 L-192 512" />
      <path d="M414.9 300 L896 512" />
      <path d="M97.1 300 L-384 512" />
    </g>
  </g>

  <!-- Soft ground shadows -->
  <ellipse cx="185" cy="410" rx="118" ry="16" fill="#000000" opacity="0.35" />
  <ellipse cx="352" cy="424" rx="40" ry="9" fill="#000000" opacity="0.35" />

  <!-- Apple (inside safe circle), sitting under the snake's dipping head -->
  <g>
    <rect x="348.5" y="345" width="7" height="17" rx="3.5" fill="#7a4a26" />
    <ellipse cx="366" cy="348" rx="12" ry="6" fill="#3fae5e" transform="rotate(-24 366 348)" />
    <circle cx="352" cy="386" r="34" fill="url(#apple)" />
    <ellipse cx="340" cy="373" rx="9" ry="5.5" fill="#ffffff" opacity="0.5" transform="rotate(-30 340 373)" />
  </g>

  <!-- Snake (inside safe circle): U-coil on the ground, neck rising into an
       arch that turns down at the right. Dark rim pass under gradient pass. -->
  <g fill="none" stroke-linecap="round">
    <!-- tapering tail tip -->
    <path d="M104 340 Q88 318 86 292" stroke="#0f3320" stroke-width="26" />
    <path d="M104 340 Q88 318 86 292" stroke="url(#body)" stroke-width="16" />
    <!-- body -->
    <path d="M104 340 Q120 394 188 396 Q250 398 264 354 Q284 296 274 252 Q266 210 302 196" stroke="#0f3320" stroke-width="64" />
    <path d="M104 340 Q120 394 188 396 Q250 398 264 354 Q284 296 274 252 Q266 210 302 196" stroke="url(#body)" stroke-width="50" />
    <!-- head: wider continuation of the same curve, turning down at the
         apple. Starts a bit along the curve (not at the body's end point) so
         its round start cap stays tucked inside the body outline instead of
         poking out as an ear at the apex. -->
    <path d="M316 192 Q341 186 350 222" stroke="#0f3320" stroke-width="80" />
    <path d="M316 192 Q341 186 350 222" stroke="url(#body)" stroke-width="66" />
    <!-- sheen highlights along the top surfaces -->
    <path d="M134 358 Q186 380 230 372" stroke="#aef2c3" stroke-width="9" opacity="0.5" />
    <path d="M282 296 Q274 258 276 232" stroke="#aef2c3" stroke-width="9" opacity="0.55" />
    <path d="M320 190 Q338 184 348 198" stroke="#aef2c3" stroke-width="8" opacity="0.5" />
  </g>

  <!-- Face, on the down-tipped head -->
  <circle cx="361" cy="212" r="9.5" fill="#0b1f13" />
  <circle cx="364" cy="208.5" r="3.2" fill="#ffffff" opacity="0.9" />
  <path d="M342 247 Q354 252 363 243" stroke="#0f3320" stroke-width="5.5" stroke-linecap="round" fill="none" opacity="0.85" />
</svg>
