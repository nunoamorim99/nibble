<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#1a1c16" />
  <g fill="#c4cfa1">
    <!-- tail tip (smallest block) -->
    <rect x="17" y="38" width="6" height="6" />
    <!-- body segments, a blocky S-path from tail to head, 1px gaps between cells -->
    <rect x="19" y="30" width="7" height="7" />
    <rect x="19" y="22" width="7" height="7" />
    <rect x="19" y="14" width="7" height="7" />
    <rect x="27" y="14" width="7" height="7" />
    <rect x="27" y="22" width="7" height="7" />
    <rect x="27" y="30" width="7" height="7" />
    <rect x="35" y="30" width="7" height="7" />
    <rect x="35" y="22" width="7" height="7" />
    <!-- head (largest block, faces up) -->
    <rect x="34" y="13" width="9" height="9" />
    <!-- eye notch -->
    <rect x="39" y="16" width="2" height="2" fill="#1a1c16" />
  </g>
</svg>
