<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    Nibble app icon — a friendly cartoon snake slithering across a glowing
    perspective grid toward a red apple, over near-black green (a miniature
    of the README cover's world).

    Pose note: the snake is deliberately drawn as a LOW, HORIZONTAL
    serpentine wave — head level with the body, big googly eyes, smile and
    flicked tongue. An earlier draft posed the body as a vertical neck with
    a swollen rounded tip, which read as phallic at a glance; keep any
    future redesign horizontal and multi-curved.

    MASKABLE-SAFE BY CONSTRUCTION: the background (gradient + grid) bleeds to
    every edge and may be cropped by any OS mask shape; the subject (snake,
    apple, face details) is authored entirely inside the safe-zone CIRCLE of
    radius 40% (r=204.8 around 256,256 — kept under r~192 for margin). The
    same art therefore serves purpose "any" AND purpose "maskable" without
    any rescaling step. Hand-authored vector — no AI image generation.

    Construction note: the head is NOT a separate circle — it is a short
    continuation path stroked wider than the body, starting inside the
    body's end with a near-matching tangent, so its round start cap fully
    swallows the body's end cap and the swell reads as one seamless creature.
  -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="78%">
      <stop offset="0%" stop-color="#0e2418" />
      <stop offset="55%" stop-color="#081510" />
      <stop offset="100%" stop-color="#040a07" />
    </radialGradient>
    <linearGradient id="body" gradientUnits="userSpaceOnUse" x1="0" y1="210" x2="0" y2="360">
      <stop offset="0%" stop-color="#5fe08d" />
      <stop offset="100%" stop-color="#2b8f4e" />
    </linearGradient>
    <radialGradient id="apple" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#ff6b5e" />
      <stop offset="55%" stop-color="#d63a30" />
      <stop offset="100%" stop-color="#8e1d18" />
    </radialGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)" />

  <!-- Perspective grid floor (background layer — safe to crop). Two passes
       per line: a wide translucent stroke for glow, a narrow crisp one. -->
  <g stroke="#35e089" fill="none">
    <!-- glow pass -->
    <g opacity="0.12" stroke-width="7">
      <path d="M0 300 H512 M0 316 H512 M0 338 H512 M0 368 H512 M0 410 H512 M0 464 H512" />
      <path d="M269.9 300 L312 512 M242.1 300 L200 512 M295.7 300 L416 512 M216.3 300 L96 512 M327.5 300 L544 512 M184.5 300 L-32 512 M367.2 300 L704 512 M144.8 300 L-192 512 M414.9 300 L896 512 M97.1 300 L-384 512" />
    </g>
    <!-- crisp pass, brighter toward the viewer -->
    <path d="M0 300 H512" stroke-width="3" opacity="0.5" />
    <path d="M0 316 H512" stroke-width="2.5" opacity="0.22" />
    <path d="M0 338 H512" stroke-width="2.5" opacity="0.28" />
    <path d="M0 368 H512" stroke-width="3" opacity="0.34" />
    <path d="M0 410 H512" stroke-width="3.5" opacity="0.42" />
    <path d="M0 464 H512" stroke-width="4" opacity="0.5" />
    <g stroke-width="2.5" opacity="0.3">
      <path d="M269.9 300 L312 512" />
      <path d="M242.1 300 L200 512" />
      <path d="M295.7 300 L416 512" />
      <path d="M216.3 300 L96 512" />
      <path d="M327.5 300 L544 512" />
      <path d="M184.5 300 L-32 512" />
      <path d="M367.2 300 L704 512" />
      <path d="M144.8 300 L-192 512" />
      <path d="M414.9 300 L896 512" />
      <path d="M97.1 300 L-384 512" />
    </g>
  </g>

  <!-- Soft ground shadows -->
  <ellipse cx="200" cy="342" rx="135" ry="12" fill="#000000" opacity="0.3" />
  <ellipse cx="376" cy="368" rx="38" ry="8" fill="#000000" opacity="0.35" />

  <!-- Apple (inside safe circle), just ahead of the snake's tongue -->
  <g>
    <rect x="372.5" y="294" width="7" height="17" rx="3.5" fill="#7a4a26" />
    <ellipse cx="390" cy="297" rx="11" ry="5.5" fill="#3fae5e" transform="rotate(-24 390 297)" />
    <circle cx="376" cy="332" r="32" fill="url(#apple)" />
    <ellipse cx="364" cy="320" rx="8.5" ry="5" fill="#ffffff" opacity="0.5" transform="rotate(-30 364 320)" />
  </g>

  <!-- Snake (inside safe circle): a low serpentine wave gliding right.
       ALL dark rim passes draw first, then ALL gradient fill passes — if a
       later segment's dark pass drew over an earlier segment's fill, the
       overlap would show as a dark crease at the joint. -->
  <g fill="none" stroke-linecap="round">
    <!-- dark rim passes: tail, body, head -->
    <path d="M96 300 Q86 296 82 288" stroke="#0f3320" stroke-width="26" />
    <path d="M96 300 Q134 234 178 280 Q208 312 240 298 Q262 288 280 292" stroke="#0f3320" stroke-width="58" />
    <path d="M266 294 Q288 287 304 291" stroke="#0f3320" stroke-width="72" />
    <!-- gradient fill passes: tail, then body (crest, trough, levelling
         out), then the head — a wider continuation of the same line, level,
         nosing at the apple -->
    <path d="M96 300 Q86 296 82 288" stroke="url(#body)" stroke-width="16" />
    <path d="M96 300 Q134 234 178 280 Q208 312 240 298 Q262 288 280 292" stroke="url(#body)" stroke-width="46" />
    <path d="M266 294 Q288 287 304 291" stroke="url(#body)" stroke-width="60" />
    <!-- sheen highlights along the top surfaces -->
    <path d="M118 272 Q138 252 162 266" stroke="#aef2c3" stroke-width="8" opacity="0.5" />
    <path d="M288 272 Q300 268 312 272" stroke="#aef2c3" stroke-width="7" opacity="0.5" />
  </g>

  <!-- Back spots, a friendly toy-like pattern -->
  <circle cx="152" cy="272" r="6.5" fill="#1e6e3c" opacity="0.75" />
  <circle cx="208" cy="301" r="6.5" fill="#1e6e3c" opacity="0.75" />
  <circle cx="247" cy="291" r="6" fill="#1e6e3c" opacity="0.75" />

  <!-- Face: big googly eyes looking at the apple, smile, flicked tongue -->
  <g>
    <circle cx="292" cy="264" r="12.5" fill="#f4fff7" stroke="#0f3320" stroke-width="3" />
    <circle cx="315" cy="267" r="13.5" fill="#f4fff7" stroke="#0f3320" stroke-width="3" />
    <circle cx="295.5" cy="267.5" r="5.4" fill="#0b1f13" />
    <circle cx="318.5" cy="270.5" r="5.8" fill="#0b1f13" />
    <circle cx="293.8" cy="265.5" r="2" fill="#ffffff" opacity="0.9" />
    <circle cx="316.8" cy="268.5" r="2" fill="#ffffff" opacity="0.9" />
    <circle cx="327" cy="283" r="2.6" fill="#0f3320" opacity="0.6" />
    <path d="M315 309 Q327 316 339 308" stroke="#0f3320" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.85" />
    <g stroke="#e0433a" stroke-width="4.5" stroke-linecap="round" fill="none">
      <path d="M336 296 Q350 292 356 284" />
      <path d="M356 284 L364 277" />
      <path d="M356 284 L363 289" />
    </g>
  </g>
</svg>
