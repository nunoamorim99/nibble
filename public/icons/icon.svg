<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    Nibble app icon — the CLASSIC blocky game snake (square grid cells, like
    the in-game renderer) slithering across a glowing perspective grid toward
    a red apple, over near-black green. Friendly personality: googly eyes on
    the apple, a smile, a tongue flicked out to lick it.

    Pose note: the body is a LOW, HORIZONTAL stepped wave — tail low left,
    an arched hump bridging over a grid gap, then level to the head. An
    early draft posed the body as a vertical neck with a swollen rounded
    tip, which read as phallic at a glance; keep any future redesign
    horizontal and multi-curved.

    MASKABLE-SAFE BY CONSTRUCTION: the background (gradient + grid) bleeds to
    every edge and may be cropped by any OS mask shape; the subject (snake,
    apple, face details) is authored entirely inside the safe-zone CIRCLE of
    radius 40% (r=204.8 around 256,256 — kept under r~194 for margin). The
    same art therefore serves purpose "any" AND purpose "maskable" without
    any rescaling step. Hand-authored vector — no AI image generation.

    Construction (three passes, so the body reads CONNECTED — per-cell
    strokes or visible gaps read as scattered loose blocks, not a snake):
      1. dark underlay: every cell expanded 4px, so the union forms one
         merged blob whose edge is the snake's outline;
      2. gradient fills: cells at exact size, TOUCHING (46px cells on a
         46px pitch), forming one continuous green body;
      3. hairline seams: short translucent lines on the shared edges hint
         at the segments without separating them.
    Cells: 46x46, upper row y=238, lower row y=284, columns every 46 from
    x=134; smaller 38px tail in the x=88 slot; larger 50px head at x=318.
    The shared vertical gradient makes the arch cells lighter for depth.
  -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="78%">
      <stop offset="0%" stop-color="#0e2418" />
      <stop offset="55%" stop-color="#081510" />
      <stop offset="100%" stop-color="#040a07" />
    </radialGradient>
    <linearGradient id="body" gradientUnits="userSpaceOnUse" x1="0" y1="228" x2="0" y2="344">
      <stop offset="0%" stop-color="#5fe08d" />
      <stop offset="100%" stop-color="#2b8f4e" />
    </linearGradient>
    <radialGradient id="apple" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#ff6b5e" />
      <stop offset="55%" stop-color="#d63a30" />
      <stop offset="100%" stop-color="#8e1d18" />
    </radialGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)" />

  <!-- Perspective grid floor (background layer — safe to crop). Two passes
       per line: a wide translucent stroke for glow, a narrow crisp one. -->
  <g stroke="#35e089" fill="none">
    <!-- glow pass -->
    <g opacity="0.12" stroke-width="7">
      <path d="M0 300 H512 M0 316 H512 M0 338 H512 M0 368 H512 M0 410 H512 M0 464 H512" />
      <path d="M269.9 300 L312 512 M242.1 300 L200 512 M295.7 300 L416 512 M216.3 300 L96 512 M327.5 300 L544 512 M184.5 300 L-32 512 M367.2 300 L704 512 M144.8 300 L-192 512 M414.9 300 L896 512 M97.1 300 L-384 512" />
    </g>
    <!-- crisp pass, brighter toward the viewer -->
    <path d="M0 300 H512" stroke-width="3" opacity="0.5" />
    <path d="M0 316 H512" stroke-width="2.5" opacity="0.22" />
    <path d="M0 338 H512" stroke-width="2.5" opacity="0.28" />
    <path d="M0 368 H512" stroke-width="3" opacity="0.34" />
    <path d="M0 410 H512" stroke-width="3.5" opacity="0.42" />
    <path d="M0 464 H512" stroke-width="4" opacity="0.5" />
    <g stroke-width="2.5" opacity="0.3">
      <path d="M269.9 300 L312 512" />
      <path d="M242.1 300 L200 512" />
      <path d="M295.7 300 L416 512" />
      <path d="M216.3 300 L96 512" />
      <path d="M327.5 300 L544 512" />
      <path d="M184.5 300 L-32 512" />
      <path d="M367.2 300 L704 512" />
      <path d="M144.8 300 L-192 512" />
      <path d="M414.9 300 L896 512" />
      <path d="M97.1 300 L-384 512" />
    </g>
  </g>

  <!-- Soft ground shadows -->
  <ellipse cx="220" cy="340" rx="155" ry="11" fill="#000000" opacity="0.3" />
  <ellipse cx="404" cy="348" rx="36" ry="8" fill="#000000" opacity="0.35" />

  <!-- Apple (inside safe circle), right at the snake's tongue -->
  <g>
    <rect x="400.5" y="274" width="7" height="17" rx="3.5" fill="#7a4a26" />
    <ellipse cx="418" cy="277" rx="11" ry="5.5" fill="#3fae5e" transform="rotate(-24 418 277)" />
    <circle cx="404" cy="313" r="30" fill="url(#apple)" />
    <ellipse cx="392" cy="301" rx="8.5" ry="5" fill="#ffffff" opacity="0.5" transform="rotate(-30 392 301)" />
  </g>

  <!-- Snake, pass 1: dark underlay — cells expanded 4px merge into one
       outlined blob -->
  <g fill="#0f3320">
    <rect x="92" y="284" width="46" height="46" rx="11" />
    <rect x="130" y="280" width="54" height="54" rx="12" />
    <rect x="130" y="234" width="54" height="54" rx="12" />
    <rect x="176" y="234" width="54" height="54" rx="12" />
    <rect x="222" y="234" width="54" height="54" rx="12" />
    <rect x="222" y="280" width="54" height="54" rx="12" />
    <rect x="268" y="280" width="54" height="54" rx="12" />
    <rect x="314" y="278" width="58" height="58" rx="13" />
  </g>

  <!-- Snake, pass 2: gradient fills, cells touching -->
  <g fill="url(#body)">
    <!-- small tail in its slot -->
    <rect x="96" y="288" width="38" height="38" rx="8" />
    <!-- lower cell, then up -->
    <rect x="134" y="284" width="46" height="46" rx="9" />
    <rect x="134" y="238" width="46" height="46" rx="9" />
    <!-- the arch, bridging over a grid gap below -->
    <rect x="180" y="238" width="46" height="46" rx="9" />
    <rect x="226" y="238" width="46" height="46" rx="9" />
    <!-- back down and level toward the head -->
    <rect x="226" y="284" width="46" height="46" rx="9" />
    <rect x="272" y="284" width="46" height="46" rx="9" />
    <!-- head, slightly proud of the row -->
    <rect x="318" y="282" width="50" height="50" rx="10" />
  </g>

  <!-- Snake, pass 3: hairline segment seams on shared edges -->
  <g stroke="#0f3320" stroke-width="3" stroke-linecap="round" opacity="0.45" fill="none">
    <path d="M134 296 L134 318" />
    <path d="M140 284 L174 284" />
    <path d="M180 244 L180 278" />
    <path d="M226 244 L226 278" />
    <path d="M232 284 L266 284" />
    <path d="M272 290 L272 324" />
    <path d="M318 290 L318 324" />
  </g>

  <!-- Face: big googly eyes looking at the apple, smile, tongue licking
       toward the apple -->
  <g>
    <circle cx="331" cy="281" r="12" fill="#f4fff7" stroke="#0f3320" stroke-width="3" />
    <circle cx="354" cy="283" r="13" fill="#f4fff7" stroke="#0f3320" stroke-width="3" />
    <circle cx="334" cy="284" r="5" fill="#0b1f13" />
    <circle cx="357.5" cy="286.5" r="5.4" fill="#0b1f13" />
    <circle cx="332.5" cy="282" r="1.8" fill="#ffffff" opacity="0.9" />
    <circle cx="356" cy="284.5" r="1.8" fill="#ffffff" opacity="0.9" />
    <path d="M343 314 Q353 319 362 312" stroke="#0f3320" stroke-width="4.5" stroke-linecap="round" fill="none" opacity="0.85" />
    <g stroke="#e0433a" stroke-width="4.5" stroke-linecap="round" fill="none">
      <path d="M368 297 Q375 294 378 288" />
      <path d="M378 288 L384 282" />
      <path d="M378 288 L383 292" />
    </g>
  </g>
</svg>
